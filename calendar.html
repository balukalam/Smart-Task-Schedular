<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📅 Task Calendar</h1>

    <a href="/" class="btn">⬅ Back</a>

    <table class="calendar">
        <tr>
            <th>Date</th>
            <th>Tasks</th>
        </tr>

        {% for task in tasks %}
        <tr>
            <td>{{ task[2] }}</td>
            <td>
                <b>{{ task[1] }}</b> <br>
                ⏰ {{ task[3] }} | ⚡ {{ task[4] }}
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
