<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Task Scheduler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🚀 Smart Task Scheduler</h1>

<!-- Stats -->
<div class="stats">
    <div>Total <span id="total">0</span></div>
    <div>✅ <span id="completed">0</span></div>
    <div>⏳ <span id="pending">0</span></div>
    <div>🚀 <span id="progress">0</span></div>
</div>

<!-- Progress Bar -->
<div class="progress-bar">
    <div id="progressFill"></div>
</div>

<!-- Search -->
<input type="text" id="searchInput" placeholder="🔍 Search task..." onkeyup="displayTasks()">

<!-- Add Task -->
<div class="form">
<input type="text" id="taskInput" placeholder="Task">
<input type="date" id="dateInput">
<input type="time" id="timeInput">

<select id="priorityInput">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="statusInput">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="addTask()">➕ Add</button>
</div>

<!-- Table -->
<table>
<thead>
<tr>
<th>Task</th>
<th>Date</th>
<th>Time</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="taskTable"></tbody>
</table>

</div>

<script src="script.js"></script>
</body>
</html>
